<!DOCTYPE html>
<html>
<head>
    <title>shivam's game zone</title>

    <style>
        body {
            margin: 0;
            background: #0b0f1a;
            color: #e6e6e6;
            font-family: monospace;
        }

        .header {
            background: #111827;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            border-bottom: 2px solid #00ffcc;
        }

        .header span {
            color: #00ffcc;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: #1f2937;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        button {
            padding: 10px;
            background: #00ffcc;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #00ccaa;
        }

        #score {
            margin-top: 10px;
            font-size: 18px;
        }

        footer {
            text-align: center;
            padding: 10px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

<div class="header">
    🎮 <span>Shivam</span>'s Game Zone
</div>

<div class="container">

    <div class="card">
        <h3>click game ⚡</h3>
        <p>just click the button as fast as you can 😄</p>

        <button onclick="addScore()">click me</button>
        <div id="score">score: 0</div>
    </div>

    <div class="card">
        <h3>random message 🎲</h3>
        <button onclick="randomMsg()">get message</button>
        <p id="msg"></p>
    </div>

</div>

<footer>
    made by shivam (testing stuff on linux 😎)
</footer>

<script>
    let score = 0;

    function addScore() {
        score++;
        document.getElementById("score").innerText = "score: " + score;
    }

    function randomMsg() {
        let arr = [
            "you are fast 😄",
            "not bad bro 🔥",
            "linux power 💻",
            "keep clicking...",
            "dev in progress 🚀"
        ];

        let rand = Math.floor(Math.random() * arr.length);
        document.getElementById("msg").innerText = arr[rand];
    }
</script>

</body>
</html>
